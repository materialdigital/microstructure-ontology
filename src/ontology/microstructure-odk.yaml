

id: microstructure
title: "Microstructure Ontology"
github_org: materialdigital
repo: materialdigital/microstructure-ontology
git_main_branch: main
license: "CC-BY-4.0"
description: >
  PMD Core ontology extension with a focus on microstructure.

edit_format: owl
edit_ontology_file: "src/ontology/microstructure-edit.owl"
uribase: "https://w3id.org/pmd"

uribase_suffix: "microstructure"
preferredPrefix: "MICROSTRUCTURE"

namespaces:
  - "https://w3id.org/pmd/co/micro/"

use_templates: false
import_group:
  products:
    - id: pmdco
      title: "PMD Core Ontology"
      mirror_from: "https://raw.githubusercontent.com/materialdigital/core-ontology/refs/heads/main/pmdco-full.owl"
      # slme: Extract only terms referenced in your ontology (reduces file size)
      module_type: custom

    - id: uo
      mirror_from: https://raw.githubusercontent.com/bio-ontology-research-group/unit-ontology/refs/heads/master/uo-full.owl
      module_type: custom
    - id: cryo
      title: "Crystallography Ontology"
      mirror_from: https://raw.githubusercontent.com/cmllezr/crystallography-subdomain-ontology/refs/heads/main/cryo-full.owl
      module_type: custom
    - id: qudt
      mirror_from: https://qudt.org/qudt-all
      module_type: custom

components:
  products:
    - filename: imports-edit.owl
      
    - filename: microstructure-shared.owl
      
    - filename: microstructure-axioms-shared.owl
      
    - filename: microstructure-microscopy.owl
    
    - filename: microstructure-defects.owl
      
    - filename: microstructure-damage.owl
      
    - filename: microstructure-phases.owl
     
primary_release: full
release_artefacts:
  - base
  - full
  - simple

export_formats:
  - owl
  - ttl

ci:
  - github_actions

idranges:
