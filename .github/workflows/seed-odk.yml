# ==============================================================================
# WORKFLOW: Setup New Ontology (End-to-End Production Ready)
# ==============================================================================
# Purpose: Initial setup of the ontology repository. This workflow automates the
# end-to-end configuration of a new PMD application ontology using ODK.
#
# IMPORT ARCHITECTURE (generated by this workflow):
# - imports-edit.owl          → imports all *_import.owl modules directly
# - {lower_id}-shared.owl     → imports imports-edit.owl
# - {lower_id}-{comp}.owl     → imports {lower_id}-shared.owl (with annotations)
# - {lower_id}-axioms-shared.owl → imports ALL unique {lower_id}-{comp}.owl files
#
# FIXES APPLIED VS. PREVIOUS VERSION:
# - axioms-shared.owl now imports ONLY files that actually exist (no mismatches)
# - Component names written to tracking file for consistency across all steps
# - Component files get shared import injected AFTER all ODK operations complete
# - Proper annotations (title, comment) added to each component file via ROBOT
# - Validation step ensures all referenced files exist before ontology build
# - uribase_suffix includes trailing slash for correct directory-style IRIs
# - Workflow chain triggers trigger-qc directly (no redundant import refresh)
# - Stub import modules created early to prevent ODK seed failures
# - Catalog patched with rewriteURIs for local import resolution via ROBOT
#
# Usage: Trigger via GitHub Actions → Actions → Setup New Ontology → Run workflow
# Required input files in repo root:
#   - imports.txt       : One "id|url" per line for external ontology imports
#   - creators.txt      : One creator name per line (for ID range allocation)
#   - component_seeds.txt OR components.txt : Component names to scaffold
# ==============================================================================
name: Setup New Ontology

on:
  workflow_dispatch:
    inputs:
      ontology_id:
        description: 'Ontology ID (will be normalized to lowercase, e.g. autoce)'
        required: true
      ontology_title:
        description: 'Ontology Title (e.g. "Automotive Components Ontology")'
        required: true
      id_digits:
        description: 'Number of digits in entity IDs (default: 7 → IDs like _0000001 to _9999999)'
        required: true
        default: '7'

jobs:
  setup_and_import:
    runs-on: ubuntu-latest

    # Write permission required: this job commits all generated files to the repo
    permissions:
      contents: write

    # Use odkfull container — provides yq, robot, make, Java, Python, and all ODK tooling
    # Version pinned for reproducibility; bump when upgrading ODK
    container: obolibrary/odkfull:v1.6

    steps:
      # ========================================================================
      # STEP 1: Checkout Repository
      # ========================================================================
      # Fetches the full git history so git operations (log, tag, describe) work
      # correctly inside the container throughout the workflow.
      # ========================================================================
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full git history required for ODK operations

      # ========================================================================
      # STEP 2: Configure Git Identity
      # ========================================================================
      # Sets the git user identity used for the automated commit at the end.
      # safe.directory is required when git runs inside a Docker container
      # (git 2.35.2+ security hardening rejects repos owned by a different UID).
      # ========================================================================
      - name: Configure Git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # Allow git to operate on the workspace directory inside the container
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      # ========================================================================
      # STEP 3: Install yq YAML Processor
      # ========================================================================
      # yq is used to read and write project-odk.yaml in a type-safe way.
      # We install the latest binary directly rather than relying on the
      # container's bundled version (which may be older and behave differently).
      # ========================================================================
      - name: Install yq (YAML processor)
        run: |
          echo "Installing latest yq binary..."
          wget -q https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 \
            -O /usr/bin/yq
          chmod +x /usr/bin/yq
          yq --version

      # ========================================================================
      # STEP 4: Configure project-odk.yaml
      # ========================================================================
      # Writes all ontology configuration into project-odk.yaml so the ODK
      # seed command (Step 5) can generate the full repository scaffold.
      #
      # Sub-tasks performed here:
      # 4a. Basic metadata (id, title, edit file path, repo)
      # 4b. URI structure
      # 4c. Namespaces (for new entity IRI generation)
      # 4d. Clear CI/CD arrays to avoid conflicts
      # 4e. Register shared infrastructure components (imports-edit, shared, axioms-shared)
      # 4f. Register user-defined component modules with {lower_id}-{name}.owl naming
      #     Uses associative array + sanitize function to guarantee uniqueness
      #     Writes processed names to .workflow-temp/processed_components.txt
      #     (Step 11 reads this file to ensure axioms-shared.owl matches exactly)
      # 4g. ID ranges — allocates 10,000-ID blocks per creator from creators.txt
      # 4h. Import products — always adds PMD Core (pmdco) + any in imports.txt
      #     Writes processed import IDs to .workflow-temp/processed_imports.txt
      #     (Step 9 reads this file to create stub *_import.owl files)
      # 4i. Deduplicates products list to prevent duplicates from repeated runs
      # ========================================================================
      - name: Configure URI structure, ID ranges, and import products
        shell: bash
        run: |
          set -euo pipefail

          CONFIG="project-odk.yaml"
          ID="${{ github.event.inputs.ontology_id }}"
          LOWER_ID=$(echo "$ID" | tr '[:upper:]' '[:lower:]')   # e.g. "autoce"
          TITLE="${{ github.event.inputs.ontology_title }}"
          DIGITS="${{ github.event.inputs.id_digits }}"

          if [ ! -f "$CONFIG" ]; then
            echo "ERROR: $CONFIG not found in repository root!"
            echo "Expected: a seed-template.yaml-based project-odk.yaml"
            exit 1
          fi

          PREFIX=$(echo "$ID" | tr '[:lower:]' '[:upper:]')     # e.g. "AUTOCE"

          # Base IRIs used throughout this step and downstream steps
          ONTBASE="https://w3id.org/pmd/${LOWER_ID}"
          COMPBASE="${ONTBASE}/components"
          IMPORTBASE="${ONTBASE}/imports"

          echo "=== Configuring ontology: $ID ==="
          echo "  Normalized ID : $LOWER_ID"
          echo "  Prefix        : $PREFIX"
          echo "  Base IRI      : $ONTBASE/"

          # ------------------------------------------------------------------
          # 4a. BASIC METADATA
          # ------------------------------------------------------------------
          yq -i ".id = \"$LOWER_ID\""                                "$CONFIG"
          yq -i ".title = \"$TITLE\""                                "$CONFIG"
          yq -i ".edit_ontology_file = \"src/ontology/$LOWER_ID-edit.owl\"" "$CONFIG"
          yq -i ".repo = \"$GITHUB_REPOSITORY\""                     "$CONFIG"

          # ------------------------------------------------------------------
          # 4b. URI STRUCTURE
          # ------------------------------------------------------------------
          yq -i ".uribase = \"https://w3id.org/pmd\""               "$CONFIG"
          yq -i ".uribase_suffix = \"$LOWER_ID\""                  "$CONFIG"
          yq -i ".preferredPrefix = \"$PREFIX\""                     "$CONFIG"

          # ------------------------------------------------------------------
          # 4c. NAMESPACES
          # Tells ODK what IRI namespace to use when generating new entity IRIs.
          # Example generated IRI: https://w3id.org/pmd/autoce/AUTOCE_0000001
          # ------------------------------------------------------------------
          yq -i ".namespaces = [\"${ONTBASE}/\"]"                    "$CONFIG"

          # ------------------------------------------------------------------
          # 4d. CI/CD & ARRAY INITIALIZATION
          # Clear CI so ODK doesn't generate unwanted workflow files.
          # Initialize arrays safely to allow append operations below.
          # ------------------------------------------------------------------
          yq -i ".ci = []"                                            "$CONFIG"
          yq -i '.components.products = (.components.products // [])' "$CONFIG"
          yq -i '.import_group.products = (.import_group.products // [])' "$CONFIG"
          yq -i '.idranges = (.idranges // [])'                       "$CONFIG"

          # ------------------------------------------------------------------
          # 4e. SHARED INFRASTRUCTURE COMPONENTS
          # Register the three shared OWL files that form the import backbone.
          # These are not user-defined components but are always required.
          #   - imports-edit.owl     : Aggregates all *_import.owl modules
          #   - {id}-shared.owl      : Imports imports-edit.owl; shared by all components
          #   - {id}-axioms-shared.owl : Aggregates all component OWL files
          # ------------------------------------------------------------------
          SHARED_COMPONENTS=("imports-edit.owl" "${LOWER_ID}-shared.owl" "${LOWER_ID}-axioms-shared.owl")
          for shared_file in "${SHARED_COMPONENTS[@]}"; do
            export SHARED_FILE="$shared_file"
            export SHARED_IRI="${COMPBASE}/${shared_file}"
            exists=$(yq e '.components.products | map(select(.filename == env(SHARED_FILE))) | length' "$CONFIG")
            if [ "${exists:-0}" -eq 0 ]; then
              yq -i '.components.products += [{"filename": env(SHARED_FILE), "base_iris": [env(SHARED_IRI)]}]' "$CONFIG"
              echo "  Registered shared component: $shared_file"
            fi
          done

          # ------------------------------------------------------------------
          # 4f. USER-DEFINED COMPONENT PRODUCTS
          #
          # Reads component names from component_seeds.txt (pipe-delimited: name|id|label|parent)
          # or components.txt (one name per line), or both.
          #
          # Key behaviors:
          # - sanitize_component_name: strips hidden unicode, carriage returns,
          #   and any characters outside [A-Za-z0-9._-] for safe filenames
          # - declare -A seen_components: bash associative array used to deduplicate
          #   component names across both input files
          # - Registered filenames use {lower_id}-{name}.owl naming (namespaced)
          # - Processed names written to tracking file so Step 11 can read
          #   the EXACT same list when building axioms-shared.owl
          # ------------------------------------------------------------------

          # Sanitize function: strip whitespace, control chars, hidden unicode
          sanitize_component_name() {
            local raw="$1"
            local trimmed
            trimmed=$(echo "$raw" | tr -d '\r' | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')
            if [ -z "$trimmed" ]; then echo ""; return; fi
            # Remove zero-width spaces (U+200B) and non-breaking spaces (U+00A0)
            trimmed=$(echo "$trimmed" | sed 's/\xe2\x80\x8b//g; s/\xc2\xa0/ /g')
            # Keep only safe filename characters
            echo "$trimmed" | LC_ALL=C tr -cd 'A-Za-z0-9._-'
          }

          declare -A seen_components
          component_list=()

          add_component() {
            local name="$1"
            if [ -z "$name" ]; then return; fi
            if [ -n "${seen_components[$name]+x}" ]; then
              echo "  Skipping duplicate component: $name"
              return
            fi
            seen_components["$name"]=1
            component_list+=("$name")
          }

          if [ -f "component_seeds.txt" ]; then
            echo "Processing components from component_seeds.txt..."
            while IFS='|' read -r raw_comp _rest || [ -n "$raw_comp" ]; do
              raw_comp=$(echo "$raw_comp" | xargs 2>/dev/null || echo "$raw_comp")
              if [ -z "$raw_comp" ] || echo "$raw_comp" | grep -qE '^\s*#'; then continue; fi
              comp_name=$(sanitize_component_name "$raw_comp")
              [ -n "$comp_name" ] && add_component "$comp_name"
            done < component_seeds.txt
          fi

          if [ -f "components.txt" ]; then
            echo "Processing components from components.txt..."
            while IFS= read -r raw_comp || [ -n "$raw_comp" ]; do
              raw_comp=$(echo "$raw_comp" | xargs 2>/dev/null || echo "$raw_comp")
              if [ -z "$raw_comp" ] || echo "$raw_comp" | grep -qE '^\s*#'; then continue; fi
              comp_name=$(sanitize_component_name "$raw_comp")
              [ -n "$comp_name" ] && add_component "$comp_name"
            done < components.txt
          fi

          echo "  Found ${#component_list[@]} unique components: ${component_list[*]:-none}"

          # Write component names to tracking file.
          # CRITICAL: Step 11 (Create Shared Component Files) reads this file
          # to build axioms-shared.owl. If the names here don't match what ODK
          # registered, the import graph will be inconsistent.
          mkdir -p .workflow-temp
          printf '%s\n' "${component_list[@]}" > .workflow-temp/processed_components.txt
          echo "  Wrote component list to .workflow-temp/processed_components.txt"

          for comp_name in "${component_list[@]}"; do
            export COMP_FILENAME="${LOWER_ID}-${comp_name}.owl"
            export COMP_IRI="${COMPBASE}/${LOWER_ID}-${comp_name}.owl"
            exists=$(yq e '.components.products | map(select(.filename == env(COMP_FILENAME))) | length' "$CONFIG")
            if [ "${exists:-0}" -eq 0 ]; then
              yq -i '.components.products += [{"filename": env(COMP_FILENAME), "base_iris": [env(COMP_IRI)]}]' "$CONFIG"
              echo "  Registered component: ${LOWER_ID}-${comp_name}.owl"
            fi
          done

          # ------------------------------------------------------------------
          # 4g. ID RANGES CONFIGURATION
          # Reads creators.txt (one creator name per line) and allocates a
          # block of 10,000 entity IDs per creator, starting from 0.
          # Example for first creator: IDs 0–9999, second: 10000–19999, etc.
          # nl -ba numbers blank lines too, so we get stable block indices.
          # IFS=$'\t' splits the nl output (index<TAB>line) correctly even
          # for creator names that contain internal spaces.
          # ------------------------------------------------------------------
          if [ -f "creators.txt" ]; then
            echo "Processing ID ranges from creators.txt..."
            ID_PREFIX="${ONTBASE}/${PREFIX}_"  # e.g. https://w3id.org/pmd/autoce/AUTOCE_
            BLOCK_SIZE=10000
            nl -ba creators.txt | while IFS=$'\t' read -r idx line || [ -n "$idx" ]; do
              idx=$(echo "$idx" | xargs)  # Trim nl padding spaces
              clean_line=$(echo "$line" | sed 's/^\s*#.*$//' | xargs)  # Remove comments
              if [ -z "$clean_line" ]; then continue; fi
              RANGE_START=$(( (idx - 1) * BLOCK_SIZE ))
              RANGE_END=$(( RANGE_START + BLOCK_SIZE - 1 ))
              export ALLOCATED_TO="$clean_line"
              export IDS_FOR="$LOWER_ID"
              export ID_PREFIX_VAR="$ID_PREFIX"
              export ID_DIGITS_VAR="$DIGITS"
              export R_START="$RANGE_START"
              export R_END="$RANGE_END"
              yq -i '.idranges += [{
                "allocatedto": env(ALLOCATED_TO),
                "idsfor": env(IDS_FOR),
                "idprefix": env(ID_PREFIX_VAR),
                "iddigits": env(ID_DIGITS_VAR),
                "range_start": env(R_START),
                "range_end": env(R_END)
              }]' "$CONFIG"
              echo "  Allocated range $RANGE_START–$RANGE_END → $clean_line"
            done
          else
            echo "No creators.txt found — no ID ranges added."
          fi

          # ------------------------------------------------------------------
          # 4h. IMPORT PRODUCTS
          # Always registers PMD Core Ontology (pmdco) as the mandatory import.
          # Additional imports are read from imports.txt (id|url format).
          # SLME (Syntactic Locality Module Extraction) is enforced for all
          # imports to minimize bloat and avoid pulling in unwanted terms.
          # Import IDs are also written to tracking file for Step 9.
          # ------------------------------------------------------------------
          echo "Configuring import products..."

          # Always add PMD Core if not already present
          exists_pmdco=$(yq e '.import_group.products | map(select(.id == "pmdco")) | length' "$CONFIG")
          if [ "${exists_pmdco:-0}" -eq 0 ]; then
            yq -i '.import_group.products += [{
              "id": "pmdco",
              "title": "PMD Core Ontology",
              "mirror_from": "https://raw.githubusercontent.com/materialdigital/core-ontology/refs/heads/main/pmdco-full.owl",
              "module_type": "slme",
              "base_iris": ["https://w3id.org/pmd/co/"]
            }]' "$CONFIG"
          fi
          echo "  Registered mandatory import: pmdco (SLME extraction)"

          # Write import IDs to tracking file (pmdco is always first)
          echo "pmdco" > .workflow-temp/processed_imports.txt

          # Add additional imports from imports.txt
          if [ -f "imports.txt" ]; then
            while IFS='|' read -r import_id import_url || [ -n "$import_id" ]; do
              if echo "$import_id" | grep -qE '^\s*#'; then continue; fi
              import_id=$(echo "${import_id:-}" | xargs | tr '[:upper:]' '[:lower:]')
              import_url=$(echo "${import_url:-}" | xargs)
              if [ -z "$import_id" ] || [ -z "$import_url" ]; then continue; fi
              echo "  - Adding import: $import_id from $import_url"
              echo "$import_id" >> .workflow-temp/processed_imports.txt
              export IMPORT_ID="$import_id"
              export IMPORT_URL="$import_url"
              exists=$(yq e '.import_group.products | map(select(.id == env(IMPORT_ID))) | length' "$CONFIG")
              if [ "${exists:-0}" -eq 0 ]; then
                yq -i '.import_group.products += [{
                  "id": env(IMPORT_ID),
                  "mirror_from": env(IMPORT_URL),
                  "module_type": "slme"
                }]' "$CONFIG"
              fi
            done < imports.txt
          else
            echo "No imports.txt found — only PMD Core import registered."
          fi

          # ------------------------------------------------------------------
          # 4i. DEDUPLICATION GUARD
          # Even if this step is re-run (e.g. after a failure), ensure no
          # duplicate products sneak into the config.
          # ------------------------------------------------------------------
          yq -i '.import_group.products |= unique_by(.id)'        "$CONFIG"
          yq -i '.components.products |= unique_by(.filename)'    "$CONFIG"

          echo "=== Configuration complete. URI base: ${ONTBASE}/ ==="

      # ========================================================================
      # STEP 5: Run ODK Seed
      # ========================================================================
      # Invokes the ODK seed command which reads project-odk.yaml and generates
      # the complete repository scaffold inside target/{lower_id}/:
      #   - src/ontology/{id}-edit.owl         (editable ontology source)
      #   - src/ontology/{id}-odk.yaml         (internal ODK config copy)
      #   - src/ontology/Makefile              (full ODK build system)
      #   - src/ontology/catalog-v001.xml      (ROBOT import catalog)
      #   - src/ontology/imports/              (import module placeholders)
      #   - src/ontology/components/           (component placeholders)
      #   - README.md, LICENSE.txt, etc.
      #
      # -c : Create mode (generates files from scratch)
      # -C : Path to config file
      # ========================================================================
      - name: Run ODK seed (generate repository scaffold)
        shell: bash
        run: |
          set -euo pipefail
          echo "Running ODK seed from project-odk.yaml..."
          /tools/odk.py seed -c -C project-odk.yaml \
            --gitname "${{ github.actor }}" \
            --gitemail "${{ github.actor }}@users.noreply.github.com"
          echo "ODK seed complete."

      # ========================================================================
      # STEP 6: Move Generated Files to Repository Root
      # ========================================================================
      # ODK seed outputs files to target/{lower_id}/ directory.
      # This step moves everything to the repository root so git tracks them.
      #
      # We remove the target/.github directory because we already have our own
      # production-ready workflows in .github/workflows/ and must not let ODK
      # overwrite them with its default CI templates.
      # ========================================================================
      - name: Move generated files to repository root
        shell: bash
        run: |
          set -euo pipefail
          ID="${{ github.event.inputs.ontology_id }}"
          LOWER_ID=$(echo "$ID" | tr '[:upper:]' '[:lower:]')
          TARGET_DIR="target/$LOWER_ID"

          if [ ! -d "$TARGET_DIR" ]; then
            echo "ERROR: ODK target directory not found: $TARGET_DIR"
            echo "This means the seed step failed or produced an unexpected output."
            exit 1
          fi

          # IMPORTANT: Remove ODK-generated .github directory to preserve our
          # custom workflows — never let ODK overwrite them.
          echo "Preserving existing .github/ workflows (removing ODK defaults)..."
          rm -rf "$TARGET_DIR/.github"

          # Copy all generated files to the repo root
          cp -r "$TARGET_DIR"/* .

          # .gitignore is a hidden file; cp with glob may miss it
          if [ -f "$TARGET_DIR/.gitignore" ]; then cp "$TARGET_DIR/.gitignore" .; fi

          # Remove the temporary target directory
          rm -rf target/

          echo "Files moved from $TARGET_DIR → repository root."

      # ========================================================================
      # STEP 6.5: Fix README Placeholders
      # ========================================================================
      # ODK's seed generates README.md with template placeholders.
      # Replace them with the actual ontology title and ID.
      # ========================================================================
      - name: Fix README placeholders
        shell: bash
        run: |
          set -euo pipefail
          LOWER_ID=$(echo "${{ github.event.inputs.ontology_id }}" | tr '[:upper:]' '[:lower:]')
          TITLE="${{ github.event.inputs.ontology_title }}"
          if [ -f "README.md" ]; then
            sed -i "s|Placeholder Title|$TITLE|g" README.md
            sed -i "s|placeholder_id|$LOWER_ID|g" README.md
            echo "README placeholders replaced: title='$TITLE', id='$LOWER_ID'"
          else
            echo "WARNING: README.md not found — skipping placeholder replacement."
          fi

      # ========================================================================
      # STEP 6.7: Append Custom README Sections
      # ========================================================================
      # Appends PMD-specific and ODK-specific documentation sections to README.md:
      # - Development workflow guide (edit, test, build, update commands)
      # - Import architecture diagram (modular OWL structure explanation)
      # - Repository structure reference table
      # - Contribution guidelines (issue tracker, forums, contacts)
      #
      # WHY PYTHON instead of a bash heredoc?
      # Bash heredocs inside YAML 'run: |' blocks require ALL content to be
      # indented at the YAML block scalar level (>= 10 spaces). Markdown content
      # containing pipe characters (| for tables) or triple-backtick code fences
      # at the start of a line is misinterpreted by the YAML parser as block
      # scalar indicators or mapping syntax. Python string literals are immune
      # to this problem — they sit safely inside the YAML-indented PYEOF heredoc.
      # ========================================================================
      - name: Append custom README sections
        shell: bash
        run: |
          set -euo pipefail
          LOWER_ID=$(echo "${{ github.event.inputs.ontology_id }}" | tr '[:upper:]' '[:lower:]')
          UPPER_ID=$(echo "${{ github.event.inputs.ontology_id }}" | tr '[:lower:]' '[:upper:]')
          TITLE="${{ github.event.inputs.ontology_title }}"
          REPO="${{ github.repository }}"

          if [ ! -f "README.md" ]; then
            echo "ERROR: README.md not found - cannot append custom sections."
            exit 1
          fi

          # All content is built as Python string literals to avoid YAML
          # syntax conflicts with markdown pipe tables and code fences.
          python << PYEOF
          import sys
          from pathlib import Path

          lower_id = "$LOWER_ID"
          upper_id = "$UPPER_ID"
          title    = "$TITLE"
          repo     = "$REPO"

          lines = [
              "",
              "## Development",
              "",
              "This ontology is developed using OWL and managed with the "
              "[Ontology Development Kit (ODK)](https://github.com/INCATools/ontology-development-kit).",
              "To contribute or edit:",
              "",
              "- Open `src/ontology/" + lower_id + "-edit.owl` in "
              "[Protege](https://protege.stanford.edu/) or your preferred OWL editor.",
              "- Create new entities within the namespace `https://w3id.org/pmd/" + lower_id + "/`.",
              "  Example IRI: `https://w3id.org/pmd/" + lower_id + "/" + upper_id + "_0000001`",
              "  (the prefix portion is always uppercase).",
              "- Use the `Makefile` for automation:",
              "  - `make test` : Run quality control (reasoner checks, syntax validation).",
              "  - `make refresh-imports` : Update imported ontologies via SLME extraction.",
              "  - `make release` : Build all release artifacts (TTL, OWL, JSON formats).",
              "  - `make update_repo` : Sync repo structure after editing `" + lower_id + "-odk.yaml`.",
              "",
              "## Import Architecture",
              "",
              "The modular import structure used by this ontology:",
              "",
              "```",
              "imports-edit.owl",
              "    imports all *_import.owl modules (e.g. pmdco_import.owl, ...)",
              "",
              lower_id + "-shared.owl",
              "    imports imports-edit.owl",
              "",
              lower_id + "-{component}.owl  (one file per component module)",
              "    imports " + lower_id + "-shared.owl",
              "    contains component-specific axioms and class definitions",
              "",
              lower_id + "-axioms-shared.owl",
              "    imports ALL " + lower_id + "-{component}.owl files",
              "```",
              "",
              "## Repository Structure",
              "",
              "| Path | Description |",
              "|------|-------------|",
              "| `.github/` | GitHub Actions CI/CD workflows |",
              "| `src/ontology/` | Ontology source files (edit here) |",
              "| `src/ontology/components/` | Modular OWL component files |",
              "| `src/ontology/imports/` | Extracted import modules (SLME) |",
              "| `src/templates/` | ROBOT template TSV files for components |",
              "| `imports.txt` | External ontology imports configuration |",
              "| `creators.txt` | Creator names for ID range allocation |",
              "",
              "## Contribution",
              "",
              "We welcome contributions to the " + title + " ontology!",
              "",
              "- **Issue tracker**: [github.com/" + repo + "/issues](https://github.com/" + repo + "/issues)",
              "  Report errors, request new terms, or flag modeling concerns.",
              "- **Discussion forum**: [github.com/" + repo + "/discussions](https://github.com/" + repo + "/discussions)",
              "  Discuss modeling decisions with the community.",
              "- **Application ontology template**:",
              "  [application-ontology-template](https://github.com/materialdigital/application-ontology-template/)",
              "  The framework used here; mirrors pmdco with all its modules.",
              "- **PMD Playground Meetings**: Every second Friday, 1-2 pm CET.",
              "  [Register via mailing list](https://www.lists.kit.edu/sympa/subscribe/ontology-playground?previous_action=info)",
              "- **Contact**: [info@material-digital.de](mailto:info@material-digital.de)",
          ]

          readme = Path("README.md")
          with readme.open("a", encoding="utf-8") as fh:
              fh.write("\n".join(lines) + "\n")
          print("Custom README sections appended (" + str(len(lines)) + " lines).")
          PYEOF

      # ========================================================================
      # STEP 7: Generate ID Ranges OWL File (Manchester Syntax)
      # ========================================================================
      # Creates src/ontology/{lower_id}-idranges.owl in Manchester Syntax.
      # This file is used by dicer-cli to enforce ID assignment rules.
      #
      # Structure:
      # - Header: standard OWL/RDF prefixes + custom prefixes for IAO annotations
      # - Ontology header with global annotations (idsfor, idprefix, iddigits)
      # - AnnotationProperty declarations (required in Manchester Syntax)
      # - One Datatype block per creator, defining their allowed integer range
      #   using xsd:integer facet restrictions (>= start, <= end)
      #
      # Block allocation: 10,000 IDs per creator (0–9999, 10000–19999, ...)
      # ========================================================================
      - name: Generate ID ranges OWL file (Manchester Syntax)
        shell: bash
        run: |
          set -euo pipefail
          ID="${{ github.event.inputs.ontology_id }}"
          LOWER_ID=$(echo "$ID" | tr '[:upper:]' '[:lower:]')
          DIGITS="${{ github.event.inputs.id_digits }}"
          PREFIX_UPPER=$(echo "$ID" | tr '[:lower:]' '[:upper:]')
          ID_PREFIX="https://w3id.org/pmd/$LOWER_ID/${PREFIX_UPPER}_"
          IDRANGE_FILE="src/ontology/${LOWER_ID}-idranges.owl"
          CREATORS_FILE="creators.txt"

          if [ ! -f "$CREATORS_FILE" ]; then
            echo "No creators.txt found — skipping ID ranges generation."
            exit 0
          fi

          mkdir -p "src/ontology"

          # Write file header: prefixes and ontology declaration
          {
            echo "Prefix: rdf: <http://www.w3.org/1999/02/22-rdf-syntax-ns#>"
            echo "Prefix: xsd: <http://www.w3.org/2001/XMLSchema#>"
            echo "Prefix: owl: <http://www.w3.org/2002/07/owl#>"
            echo "Prefix: rdfs: <http://www.w3.org/2000/01/rdf-schema#>"
            echo "Prefix: xml: <http://www.w3.org/XML/1998/namespace>"
            echo "Prefix: dce: <http://purl.org/dc/elements/1.1/>"
            # Annotation property prefixes (IAO ID range properties)
            echo "Prefix: allocatedto: <http://purl.obolibrary.org/obo/IAO_0000597>"
            echo "Prefix: idsfor: <http://purl.obolibrary.org/obo/IAO_0000598>"
            echo "Prefix: idprefix: <http://purl.obolibrary.org/obo/IAO_0000599>"
            echo "Prefix: iddigits: <http://purl.obolibrary.org/obo/IAO_0000596>"
            echo "Prefix: idrange: <http://purl.obolibrary.org/obo/ro/idrange/>"
            echo ""
            echo "Ontology: <https://w3id.org/pmd/$LOWER_ID/${LOWER_ID}-idranges.owl>"
            echo ""
            # Global ontology-level annotations
            echo "Annotations:"
            echo "    idsfor: \"$PREFIX_UPPER\","
            echo "    idprefix: \"$ID_PREFIX\","
            echo "    iddigits: $DIGITS"
            echo ""
            # AnnotationProperty declarations are mandatory in Manchester Syntax
            echo "AnnotationProperty: allocatedto:"
            echo ""
            echo "AnnotationProperty: idsfor:"
            echo ""
            echo "AnnotationProperty: idprefix:"
            echo ""
            echo "AnnotationProperty: iddigits:"
            echo ""
          } > "$IDRANGE_FILE"

          # Write one Datatype block per creator
          BLOCK_SIZE=10000
          nl -ba "$CREATORS_FILE" | while IFS=$'\t' read -r idx line || [ -n "$idx" ]; do
            idx=$(echo "$idx" | xargs)
            clean_line=$(echo "$line" | sed 's/^\s*#.*$//' | xargs)
            if [ -z "$clean_line" ]; then continue; fi
            RANGE_START=$(( (idx - 1) * BLOCK_SIZE ))
            RANGE_END=$(( RANGE_START + BLOCK_SIZE - 1 ))
            {
              echo "Datatype: idrange:$idx"
              echo "    Annotations:"
              echo "        allocatedto: \"$clean_line\""
              echo "    EquivalentTo:"
              echo "        xsd:integer[>= $RANGE_START , <= $RANGE_END]"
              echo ""
            } >> "$IDRANGE_FILE"
            echo "  Added range $RANGE_START–$RANGE_END → $clean_line"
          done

          # Required base datatype declarations
          {
            echo "Datatype: xsd:integer"
            echo "Datatype: rdf:PlainLiteral"
          } >> "$IDRANGE_FILE"

          echo "ID ranges file generated: $IDRANGE_FILE"

      # ========================================================================
      # STEP 8: Create Import Terms Files
      # ========================================================================
      # For each registered import, creates a terms file in src/ontology/imports/
      # named {id}_terms.txt. ODK uses these files during SLME extraction to
      # know which terms to pull from the upstream ontology.
      #
      # Priority order for source files:
      # 1. Custom: {IMPORT_ID^^}-terms.txt (e.g. PMDCO-terms.txt)
      # 2. Standard: {import_id}_terms.txt (e.g. pmdco_terms.txt)
      # 3. Fallback: creates an empty placeholder with usage instructions
      # ========================================================================
      - name: Create import terms files
        shell: bash
        run: |
          set -euo pipefail
          IMPORTS_DIR="src/ontology/imports"
          mkdir -p "$IMPORTS_DIR"

          # Function: find and copy terms file for a given import ID
          process_terms_file() {
            local onto_id=$1
            local custom_source="${onto_id^^}-terms.txt"   # e.g. PMDCO-terms.txt
            local standard_source="${onto_id}_terms.txt"   # e.g. pmdco_terms.txt
            local target_file="$IMPORTS_DIR/${onto_id}_terms.txt"

            if [ -f "$custom_source" ]; then
              echo "  Found custom terms file: $custom_source → $target_file"
              cp "$custom_source" "$target_file"
            elif [ -f "$standard_source" ]; then
              echo "  Found standard terms file: $standard_source → $target_file"
              cp "$standard_source" "$target_file"
            else
              echo "  No terms file for '$onto_id' — creating empty placeholder."
              {
                echo "# Terms to import from the $onto_id ontology via SLME extraction"
                echo "# Format: one IRI per line (blank lines and # comments are ignored)"
                echo "# Example: https://w3id.org/pmd/co/PMDCO_0000001"
                echo "# Leave empty to import the minimal closure (only referenced terms)."
              } > "$target_file"
            fi
          }

          echo "Processing import terms files..."
          # Always process PMD Core
          process_terms_file "pmdco"

          # Process additional imports from imports.txt
          if [ -f "imports.txt" ]; then
            while IFS='|' read -r import_id import_url || [ -n "$import_id" ]; do
              if echo "$import_id" | grep -qE '^\s*#'; then continue; fi
              import_id=$(echo "${import_id:-}" | xargs | tr '[:upper:]' '[:lower:]')
              [ -n "$import_id" ] && process_terms_file "$import_id"
            done < imports.txt
          fi
          echo "Terms files setup complete in $IMPORTS_DIR."

      # ========================================================================
      # STEP 9: Create Stub Import Module OWL Files
      # ========================================================================
      # ODK expects each configured import to have a corresponding *_import.owl
      # file in src/ontology/imports/. If these don't exist before make
      # refresh-imports runs, ODK may fail or produce incorrect output.
      #
      # This step creates minimal valid OWL stubs for each import so subsequent
      # make targets have the expected file structure. The actual content will be
      # populated by make refresh-imports in Step 13.
      #
      # Import IDs are read from the tracking file created in Step 4h to ensure
      # perfect consistency with what was registered in project-odk.yaml.
      # ========================================================================
      - name: Create stub import module OWL files
        shell: bash
        run: |
          set -euo pipefail
          ID="${{ github.event.inputs.ontology_id }}"
          LOWER_ID=$(echo "$ID" | tr '[:upper:]' '[:lower:]')
          ONTBASE="https://w3id.org/pmd/${LOWER_ID}"
          IMPORTBASE="${ONTBASE}/imports"

          mkdir -p src/ontology/imports

          # Read import IDs from tracking file (matches Step 4 exactly)
          IMPORT_IDS=()
          if [ -f ".workflow-temp/processed_imports.txt" ]; then
            while IFS= read -r iid || [ -n "$iid" ]; do
              iid=$(echo "$iid" | xargs)
              [ -n "$iid" ] && IMPORT_IDS+=("$iid")
            done < .workflow-temp/processed_imports.txt
          else
            # Fallback if tracking file is missing
            echo "WARNING: Tracking file not found; falling back to imports.txt"
            IMPORT_IDS=("pmdco")
            if [ -f "imports.txt" ]; then
              while IFS='|' read -r import_id _url || [ -n "$import_id" ]; do
                echo "$import_id" | grep -qE '^\s*#' && continue
                import_id=$(echo "${import_id:-}" | xargs | tr '[:upper:]' '[:lower:]')
                [ -n "$import_id" ] && IMPORT_IDS+=("$import_id")
              done < imports.txt
            fi
          fi

          echo "Creating stub import OWL files for: ${IMPORT_IDS[*]}"
          for iid in "${IMPORT_IDS[@]}"; do
            STUB_FILE="src/ontology/imports/${iid}_import.owl"
            if [ ! -f "$STUB_FILE" ]; then
              cat > "$STUB_FILE" << STUBEOF
          Prefix(:=<${ONTBASE}/>)
          Prefix(owl:=<http://www.w3.org/2002/07/owl#>)

          Ontology(<${IMPORTBASE}/${iid}_import.owl>)
          STUBEOF
              echo "  Created stub: ${iid}_import.owl"
            else
              echo "  Stub already exists: ${iid}_import.owl (skipping)"
            fi
          done
          echo "Stub import modules ready."

      # ========================================================================
      # STEP 10: Patch catalog-v001.xml
      # ========================================================================
      # ROBOT uses the OWL API catalog file (catalog-v001.xml) to resolve import
      # IRIs to local file paths. Without entries for our imports/ and components/
      # directories, ROBOT would try to fetch them over HTTP, which fails in CI.
      #
      # This step uses Python's xml.etree.ElementTree to add rewriteURI entries
      # for both the imports/ and components/ directories if they're not already
      # present. Existing entries are preserved.
      #
      # After patching, ROBOT resolves:
      #   https://w3id.org/pmd/{id}/imports/*  →  imports/*  (local file)
      #   https://w3id.org/pmd/{id}/components/*  →  components/*  (local file)
      # ========================================================================
      - name: Patch catalog-v001.xml for local import resolution
        shell: bash
        run: |
          set -euo pipefail
          ID="${{ github.event.inputs.ontology_id }}"
          LOWER_ID=$(echo "$ID" | tr '[:upper:]' '[:lower:]')
          CATALOG="src/ontology/catalog-v001.xml"
          ONTBASE="https://w3id.org/pmd/${LOWER_ID}"

          if [ ! -f "$CATALOG" ]; then
            echo "ERROR: $CATALOG not found — ODK seed may have failed."
            exit 1
          fi

          python3 << PYEOF
          import xml.etree.ElementTree as ET
          from pathlib import Path

          catalog_path = Path("$CATALOG")
          base = "$ONTBASE"

          ns_uri = "urn:oasis:names:tc:entity:xmlns:xml:catalog"
          ET.register_namespace("", ns_uri)

          tree = ET.parse(catalog_path)
          root = tree.getroot()

          # Entries to ensure exist in the catalog
          rewrites = [
              (f"{base}/imports/",    "imports/"),
              (f"{base}/components/", "components/"),
          ]

          # Collect existing uriStartString values to avoid duplicates
          existing_starts = set()
          for elem in root.findall(f"{{{ns_uri}}}rewriteURI"):
              existing_starts.add(elem.get("uriStartString"))

          insert_position = 0
          for uri_start, rewrite_prefix in rewrites:
              if uri_start not in existing_starts:
                  new_elem = ET.Element(f"{{{ns_uri}}}rewriteURI")
                  new_elem.set("uriStartString", uri_start)
                  new_elem.set("rewritePrefix", rewrite_prefix)
                  root.insert(insert_position, new_elem)
                  insert_position += 1
                  print(f"  Added catalog entry: {uri_start} -> {rewrite_prefix}")
              else:
                  print(f"  Catalog entry already present: {uri_start}")

          tree.write(catalog_path, encoding="UTF-8", xml_declaration=True)
          print("Catalog patched successfully.")
          PYEOF

      # ========================================================================
      # STEP 11: Create Shared Component Infrastructure OWL Files
      # ========================================================================
      # Creates the three backbone OWL files that define the import hierarchy:
      #
      # 1. imports-edit.owl
      #    - Contains Import() statements for every *_import.owl module
      #    - Acts as a single aggregation point for all external terms
      #
      # 2. {lower_id}-shared.owl
      #    - Imports imports-edit.owl
      #    - Imported by every component module so they all share the same terms
      #
      # 3. {lower_id}-axioms-shared.owl
      #    - Imports ALL unique component OWL files
      #    - The top-level aggregation file for the full axiom set
      #
      # CRITICAL: Component names are read from the tracking file written in
      # Step 4f (.workflow-temp/processed_components.txt). This guarantees that
      # axioms-shared.owl references EXACTLY the same filenames as were
      # registered in project-odk.yaml — no more, no less.
      #
      # Fallback: If the tracking file is missing (e.g. re-run scenario), the
      # script scans the components/ directory for existing {lower_id}-*.owl files.
      # ========================================================================
      - name: Create shared component infrastructure OWL files
        shell: bash
        run: |
          set -euo pipefail
          ID="${{ github.event.inputs.ontology_id }}"
          LOWER_ID=$(echo "$ID" | tr '[:upper:]' '[:lower:]')
          ONTBASE="https://w3id.org/pmd/${LOWER_ID}"
          COMPBASE="${ONTBASE}/components"
          IMPORTBASE="${ONTBASE}/imports"

          mkdir -p src/ontology/components

          python3 << PYEOF
          import re
          from pathlib import Path

          lower_id = "$LOWER_ID"
          ontbase  = "$ONTBASE"
          compbase = "$COMPBASE"
          importbase = "$IMPORTBASE"

          component_dir = Path("src/ontology/components")
          component_dir.mkdir(parents=True, exist_ok=True)

          # Standard Manchester Syntax prefixes used by all generated OWL files
          prefixes = f"""Prefix(:=<{ontbase}/>)
          Prefix(owl:=<http://www.w3.org/2002/07/owl#>)
          Prefix(rdf:=<http://www.w3.org/1999/02/22-rdf-syntax-ns#>)
          Prefix(xml:=<http://www.w3.org/XML/1998/namespace>)
          Prefix(xsd:=<http://www.w3.org/2001/XMLSchema#>)
          Prefix(rdfs:=<http://www.w3.org/2000/01/rdf-schema#>)
          """

          # ----------------------------------------------------------------
          # 1. Read import IDs from tracking file
          # ----------------------------------------------------------------
          import_ids = []
          tracking_imports = Path(".workflow-temp/processed_imports.txt")
          if tracking_imports.exists():
              print("  Reading import IDs from tracking file...")
              for line in tracking_imports.read_text().splitlines():
                  line = line.strip()
                  if line and line not in import_ids:
                      import_ids.append(line)
          else:
              print("  Tracking file not found — falling back to imports.txt")
              import_ids = ["pmdco"]
              imports_file = Path("imports.txt")
              if imports_file.exists():
                  for line in imports_file.read_text().splitlines():
                      line = line.strip()
                      if not line or line.startswith("#"):
                          continue
                      parts = line.split("|")
                      if parts:
                          imp_id = parts[0].strip().lower()
                          if imp_id and imp_id not in import_ids:
                              import_ids.append(imp_id)

          print(f"  Import IDs: {import_ids}")

          # ----------------------------------------------------------------
          # 2. Create imports-edit.owl
          #    Aggregates all *_import.owl modules into a single OWL file
          # ----------------------------------------------------------------
          import_stmts = "\n".join(
              [f"Import(<{importbase}/{iid}_import.owl>)" for iid in import_ids]
          )
          imports_edit_content = f"""{prefixes}
          Ontology(<{compbase}/imports-edit.owl>
          {import_stmts}
          )
          """
          (component_dir / "imports-edit.owl").write_text(imports_edit_content, encoding="utf-8")
          print(f"  Created imports-edit.owl (imports {len(import_ids)} module(s))")

          # ----------------------------------------------------------------
          # 3. Create {lower_id}-shared.owl
          #    Single shared base file for all component modules
          # ----------------------------------------------------------------
          shared_content = f"""{prefixes}
          Ontology(<{compbase}/{lower_id}-shared.owl>
          Import(<{compbase}/imports-edit.owl>)
          )
          """
          (component_dir / f"{lower_id}-shared.owl").write_text(shared_content, encoding="utf-8")
          print(f"  Created {lower_id}-shared.owl")

          # ----------------------------------------------------------------
          # 4. Read unique component names from tracking file
          #    CRITICAL: Must match what was registered in ODK config exactly
          # ----------------------------------------------------------------
          unique_components = []
          tracking_file = Path(".workflow-temp/processed_components.txt")

          if tracking_file.exists():
              print("  Reading component names from tracking file...")
              for line in tracking_file.read_text().splitlines():
                  name = line.strip()
                  if name and name not in unique_components:
                      unique_components.append(name)
              print(f"  Found {len(unique_components)} component(s) from tracking file")
          else:
              print("  Tracking file not found — scanning components directory...")
              skip_patterns = {
                  "imports-edit.owl",
                  f"{lower_id}-shared.owl",
                  f"{lower_id}-axioms-shared.owl",
              }
              for owl_file in sorted(component_dir.glob(f"{lower_id}-*.owl")):
                  if owl_file.name in skip_patterns:
                      continue
                  if owl_file.name.startswith(f"{lower_id}-") and owl_file.name.endswith(".owl"):
                      comp = owl_file.name[len(f"{lower_id}-"):-4]
                      if comp and comp != "shared" and "axioms-shared" not in comp:
                          if comp not in unique_components:
                              unique_components.append(comp)
                              print(f"    Found: {owl_file.name}")

          print(f"  Final component list ({len(unique_components)}): {unique_components}")

          # ----------------------------------------------------------------
          # 5. Create {lower_id}-axioms-shared.owl
          #    Top-level aggregation: imports ALL unique component files
          # ----------------------------------------------------------------
          axiom_imports = "\n".join(
              [f"Import(<{compbase}/{lower_id}-{comp}.owl>)" for comp in unique_components]
          )
          axioms_content = f"""{prefixes}
          Ontology(<{compbase}/{lower_id}-axioms-shared.owl>
          {axiom_imports}
          )
          """
          (component_dir / f"{lower_id}-axioms-shared.owl").write_text(axioms_content, encoding="utf-8")
          print(f"  Created {lower_id}-axioms-shared.owl (imports {len(unique_components)} component(s))")
          print("Shared component infrastructure files created successfully.")
          PYEOF

      # ========================================================================
      # STEP 12: Normalize Double Slashes in OWL Files
      # ========================================================================
      # When the uribase and uribase_suffix are concatenated by ODK, a double
      # slash can sometimes appear in generated IRIs (e.g. /pmd//autoce/).
      # This step scans all generated OWL files and corrects any double slashes
      # in our namespace (https://w3id.org/pmd/{id}//).
      # ========================================================================
      - name: Normalize double slashes in generated OWL files
        shell: bash
        run: |
          set -euo pipefail
          ID="${{ github.event.inputs.ontology_id }}"
          LOWER_ID=$(echo "$ID" | tr '[:upper:]' '[:lower:]')

          echo "Scanning for double slashes in OWL files..."
          fixed=0
          while IFS= read -r file; do
            if grep -q "https://w3id.org/pmd/${LOWER_ID}//" "$file" 2>/dev/null; then
              sed -i "s|https://w3id.org/pmd/${LOWER_ID}//|https://w3id.org/pmd/${LOWER_ID}/|g" "$file"
              echo "  Fixed double slashes in: $file"
              fixed=$((fixed + 1))
            fi
          done < <(find src/ontology -name "*.owl" -type f)

          if [ "$fixed" -eq 0 ]; then
            echo "  No double slashes found — files are clean."
          else
            echo "  Fixed $fixed file(s)."
          fi

      # ========================================================================
      # STEP 12.5: Validate Component File Consistency
      # ========================================================================
      # Reads the Import() statements from axioms-shared.owl and checks that
      # every referenced component file actually exists on disk.
      #
      # If any files are missing (which can happen if ODK seed didn't generate
      # them yet), this step creates minimal valid stub OWL files for them so
      # subsequent make targets don't fail on missing file errors.
      #
      # This is a safety net — in a correctly configured run, all files should
      # already exist from Step 11.
      # ========================================================================
      - name: Validate component file consistency
        shell: bash
        run: |
          set -euo pipefail
          ID="${{ github.event.inputs.ontology_id }}"
          LOWER_ID=$(echo "$ID" | tr '[:upper:]' '[:lower:]')
          COMPONENT_DIR="src/ontology/components"
          AXIOMS_FILE="$COMPONENT_DIR/${LOWER_ID}-axioms-shared.owl"

          echo "=== Validating component file consistency ==="

          if [ ! -f "$AXIOMS_FILE" ]; then
            echo "ERROR: axioms-shared.owl not found at $AXIOMS_FILE"
            exit 1
          fi

          MISSING_FILES=()
          while IFS= read -r line; do
            # Extract component name from:  Import(<...components/{lower_id}-{comp}.owl>)
            if [[ "$line" =~ Import\(\<.*components/${LOWER_ID}-([^.]+)\.owl\>\) ]]; then
              comp_name="${BASH_REMATCH[1]}"
              expected_file="$COMPONENT_DIR/${LOWER_ID}-${comp_name}.owl"
              if [ ! -f "$expected_file" ]; then
                echo "  MISSING: $expected_file"
                MISSING_FILES+=("$comp_name")
              else
                echo "  OK:      $expected_file"
              fi
            fi
          done < "$AXIOMS_FILE"

          # Create stub files for any missing components
          if [ ${#MISSING_FILES[@]} -gt 0 ]; then
            echo ""
            echo "Creating stub files for ${#MISSING_FILES[@]} missing component(s)..."
            ONTBASE="https://w3id.org/pmd/${LOWER_ID}"
            COMPBASE="${ONTBASE}/components"
            SHARED_IRI="${COMPBASE}/${LOWER_ID}-shared.owl"
            UPPER_ID=$(echo "$ID" | tr '[:lower:]' '[:upper:]')

            for comp_name in "${MISSING_FILES[@]}"; do
              STUB_FILE="$COMPONENT_DIR/${LOWER_ID}-${comp_name}.owl"
              PRETTY_NAME=$(echo "$comp_name" | tr '_' ' ' | sed 's/./\u&/')
              cat > "$STUB_FILE" << STUBEOF
          Prefix(:=<${ONTBASE}/>)
          Prefix(owl:=<http://www.w3.org/2002/07/owl#>)
          Prefix(rdf:=<http://www.w3.org/1999/02/22-rdf-syntax-ns#>)
          Prefix(xml:=<http://www.w3.org/XML/1998/namespace>)
          Prefix(xsd:=<http://www.w3.org/2001/XMLSchema#>)
          Prefix(rdfs:=<http://www.w3.org/2000/01/rdf-schema#>)

          Ontology(<${COMPBASE}/${LOWER_ID}-${comp_name}.owl>
          Import(<${SHARED_IRI}>)
          Annotation(<http://purl.org/dc/terms/title> "${UPPER_ID} - ${PRETTY_NAME} Module"@en)
          Annotation(<http://www.w3.org/2000/01/rdf-schema#comment> "The ${comp_name} module of the ${UPPER_ID} Ontology."@en)
          )
          STUBEOF
              echo "  Created stub: ${LOWER_ID}-${comp_name}.owl"
            done
          fi

          echo ""
          echo "Component files in $COMPONENT_DIR:"
          ls -la "$COMPONENT_DIR/"
          echo "=== Validation complete ==="

      # ========================================================================
      # STEP 13: Refresh Ontology Imports
      # ========================================================================
      # Runs ODK's make refresh-imports to:
      # 1. Mirror (download) the upstream ontologies listed in import_group
      # 2. Extract only the terms listed in imports/*_terms.txt via SLME
      # 3. Write the extracted modules to imports/*_import.owl
      #
      # Flags:
      #   IMP=true  : Enable import module generation
      #   MIR=true  : Enable local mirroring of upstream ontologies
      #
      # Memory: 8GB Java heap (-Xmx8G) to handle large upstream ontologies
      # like pmdco during extraction. Adjust if OOM errors occur.
      #
      # Debug output: catalog, import files, and component files are listed
      # before make runs to aid debugging if the step fails.
      # ========================================================================
      - name: Refresh ontology imports (SLME extraction)
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Pre-refresh state ==="
          echo "--- catalog-v001.xml ---"
          cat src/ontology/catalog-v001.xml
          echo ""
          echo "--- imports/ directory ---"
          ls -la src/ontology/imports/
          echo ""
          echo "--- components/ directory ---"
          ls -la src/ontology/components/
          echo "=========================="
          echo ""
          echo "Running make refresh-imports..."
          cd src/ontology
          make refresh-imports IMP=true MIR=true ROBOT_ENV='ROBOT_JAVA_ARGS=-Xmx8G'
          echo "Imports refreshed successfully."

      # ========================================================================
      # STEP 14: Initialize Component Templates
      # ========================================================================
      # Creates ROBOT template TSV files for each component defined in
      # component_seeds.txt. These TSV files allow ontology editors to add
      # terms in a spreadsheet format rather than editing OWL directly.
      #
      # Also creates src/ontology/config/context.json which provides JSON-LD
      # prefix mappings needed when ROBOT processes the template TSVs.
      #
      # After creating templates, runs make update_repo so the Makefile
      # gains targets to build component OWL files from the TSV templates.
      # ========================================================================
      - name: Initialize component ROBOT templates
        shell: bash
        run: |
          set -euo pipefail
          ID="${{ github.event.inputs.ontology_id }}"
          LOWER_ID=$(echo "$ID" | tr '[:upper:]' '[:lower:]')
          INTERNAL_CONFIG="src/ontology/${LOWER_ID}-odk.yaml"

          mkdir -p src/templates
          mkdir -p src/ontology/config

          # Create JSON-LD context for ROBOT template prefix resolution
          if [ ! -f "src/ontology/config/context.json" ]; then
            cat > src/ontology/config/context.json << CTXEOF
          {
            "@context": {
              "$LOWER_ID": "https://w3id.org/pmd/$LOWER_ID/",
              "pmdco": "https://w3id.org/pmd/co/",
              "rdf": "http://www.w3.org/1999/02/22-rdf-syntax-ns#",
              "rdfs": "http://www.w3.org/2000/01/rdf-schema#",
              "owl": "http://www.w3.org/2002/07/owl#"
            }
          }
          CTXEOF
            echo "Created src/ontology/config/context.json"
          fi

          # Use Python for robust template generation (handles all encoding edge cases)
          python3 << PYEOF
          import re
          from pathlib import Path

          lower_id = "$LOWER_ID"

          def sanitize_name(raw):
              if not raw:
                  return ""
              # Strip hidden unicode characters (zero-width space, non-breaking space)
              raw = raw.replace('\u200b', '').replace('\xa0', ' ')
              raw = raw.strip()
              # Keep only safe filename characters
              return re.sub(r'[^A-Za-z0-9._-]', '', raw)

          seeds_file = Path("component_seeds.txt")
          if not seeds_file.exists():
              print("No component_seeds.txt found — skipping template generation.")
              exit(0)

          templates_dir = Path("src/templates")
          templates_dir.mkdir(parents=True, exist_ok=True)

          # Parse seeds and group rows by component name
          # Format: component_name|entity_id|rdfs:label|parent_class
          component_rows = {}
          for line in seeds_file.read_text().splitlines():
              line = line.strip()
              if not line or line.startswith("#"):
                  continue
              parts = line.split("|")
              if len(parts) >= 1:
                  comp_name = sanitize_name(parts[0])
                  if not comp_name:
                      continue
                  if comp_name not in component_rows:
                      component_rows[comp_name] = []
                  if len(parts) >= 4:
                      component_rows[comp_name].append({
                          'id':     parts[1].strip() if len(parts) > 1 else '',
                          'label':  parts[2].strip() if len(parts) > 2 else '',
                          'parent': parts[3].strip() if len(parts) > 3 else '',
                      })

          print(f"Found {len(component_rows)} unique component(s) for templates")

          for comp_name, rows in component_rows.items():
              # Use {lower_id}-{comp_name}.tsv naming to match component OWL file naming
              tsv_file = templates_dir / f"{lower_id}-{comp_name}.tsv"
              if not tsv_file.exists():
                  lines = [
                      "ID\tLabel\tParent Class",
                      "ID\tA rdfs:label\tSC %",
                  ]
                  for row in rows:
                      if row['id']:
                          lines.append(f"{row['id']}\t{row['label']}\t{row['parent']}")
                  tsv_file.write_text("\n".join(lines) + "\n", encoding="utf-8")
                  print(f"  Created template: {tsv_file.name}")

          print("Template generation complete.")
          PYEOF

          # Re-generate the Makefile so it includes targets for the new templates
          if [ -d "src/templates" ] && [ "$(ls -A src/templates 2>/dev/null)" ]; then
            echo "Regenerating repository Makefile (update_repo for templates)..."
            cd src/ontology
            make update_repo 2>/dev/null || echo "WARNING: update_repo exited non-zero (may be non-critical)"
            echo "Makefile updated."
          fi

      # ========================================================================
      # STEP 15: Remove Auto-Generated Root Class
      # ========================================================================
      # ODK seed generates a root class ({PREFIX}_0000000) and marks it as a
      # "root node" placeholder. In PMD ontologies, we manage the class hierarchy
      # differently (via shared imports), so this root class should be removed.
      # ========================================================================
      - name: Remove ODK auto-generated root class
        shell: bash
        run: |
          set -euo pipefail
          ID="${{ github.event.inputs.ontology_id }}"
          LOWER_ID=$(echo "$ID" | tr '[:upper:]' '[:lower:]')
          PREFIX=$(echo "$ID" | tr '[:lower:]' '[:upper:]')
          EDIT_FILE="src/ontology/${LOWER_ID}-edit.owl"

          if [ -f "$EDIT_FILE" ]; then
            # Remove the line containing the root class ID and the "root node" comment
            sed -i "/${PREFIX}_0000000/d" "$EDIT_FILE"
            sed -i '/root node/d' "$EDIT_FILE"
            echo "Removed auto-generated root class (${PREFIX}_0000000) from $EDIT_FILE."
          else
            echo "WARNING: $EDIT_FILE not found — skipping root class removal."
          fi

      # ========================================================================
      # STEP 16: Set Ontology IRI to Directory Style
      # ========================================================================
      # By default, ODK sets the ontology IRI to a file-based path.
      # PMD convention uses directory-style IRIs (trailing slash), e.g.:
      #   https://w3id.org/pmd/autoce/
      #
      # We use ROBOT's `annotate` command to overwrite the ontology IRI in
      # the edit.owl file to enforce this convention.
      # ========================================================================
      - name: Set ontology IRI to directory style
        shell: bash
        run: |
          set -euo pipefail
          LOWER_ID=$(echo "${{ github.event.inputs.ontology_id }}" | tr '[:upper:]' '[:lower:]')
          EDIT_FILE="src/ontology/${LOWER_ID}-edit.owl"
          ONT_IRI="https://w3id.org/pmd/${LOWER_ID}/"

          if [ -f "$EDIT_FILE" ]; then
            robot annotate \
              --input "$EDIT_FILE" \
              --ontology-iri "$ONT_IRI" \
              --output "$EDIT_FILE"
            echo "Ontology IRI set to directory style: $ONT_IRI"
          else
            echo "WARNING: $EDIT_FILE not found — skipping IRI annotation."
          fi

      # ========================================================================
      # STEP 17: Run QC Tests and Update Repo Structure
      # ========================================================================
      # Runs two final ODK make targets before the component injection step:
      #
      # make test:
      #   - Runs the ROBOT reasoner (ELK or HermiT) to check consistency
      #   - Validates OWL syntax, annotation requirements, etc.
      #   - Exits non-zero on any QC failure
      #
      # make update_repo:
      #   - Regenerates the Makefile and config files based on {id}-odk.yaml
      #   - Ensures all targets are in sync with the current configuration
      # ========================================================================
      - name: Run QC tests and update repository structure
        shell: bash
        run: |
          set -euo pipefail
          echo "Running ODK QC tests..."
          cd src/ontology
          make test ROBOT_ENV='ROBOT_JAVA_ARGS=-Xmx8G'
          echo "QC passed."
          echo "Updating repository structure (make update_repo)..."
          make update_repo
          echo "Repository structure updated."

      # ========================================================================
      # STEP 18: Inject Shared Import and Annotations into Component Files
      # ========================================================================
      # CRITICAL: This step runs AFTER all ODK operations (seed, make, update_repo)
      # to ensure injected changes are not overwritten by subsequent make calls.
      #
      # What this step does for each component OWL file:
      # 1. Converts the file to RDF/XML using ROBOT (enables safe XML manipulation)
      #    Uses --catalog flag so ROBOT resolves imports locally (not via HTTP)
      # 2. Injects owl:imports statement pointing to {lower_id}-shared.owl
      # 3. Adds dcterms:title and rdfs:comment annotations if not already present
      # 4. Converts back to Manchester Syntax (omn format) and overwrites original
      #
      # Infrastructure files (imports-edit.owl, shared.owl, axioms-shared.owl)
      # are also normalized to Manchester Syntax but do NOT get the shared import
      # or annotations injected (they already have their own correct content).
      #
      # ROBOT is run from src/ontology/ so catalog rewritePrefix paths resolve
      # correctly (e.g. "imports/" → "src/ontology/imports/").
      # ========================================================================
      - name: Inject shared import and annotations into component files
        shell: bash
        run: |
          set -euo pipefail
          ID="${{ github.event.inputs.ontology_id }}"
          LOWER_ID=$(echo "$ID" | tr '[:upper:]' '[:lower:]')
          UPPER_ID=$(echo "$ID" | tr '[:lower:]' '[:upper:]')
          ONTBASE="https://w3id.org/pmd/${LOWER_ID}"
          COMPBASE="${ONTBASE}/components"
          SHARED_IRI="${COMPBASE}/${LOWER_ID}-shared.owl"

          WORKDIR="src/ontology"
          COMPONENT_DIR="${WORKDIR}/components"
          CATALOG_FILE="${WORKDIR}/catalog-v001.xml"

          if [ ! -d "$COMPONENT_DIR" ]; then
            echo "ERROR: Component directory not found: $COMPONENT_DIR"
            exit 1
          fi

          if [ ! -f "$CATALOG_FILE" ]; then
            echo "ERROR: Catalog file not found: $CATALOG_FILE"
            exit 1
          fi

          echo "Injecting shared imports + annotations into component files..."
          echo "Using catalog: $CATALOG_FILE"

          # Run from src/ontology/ so catalog rewritePrefix ("imports/", "components/")
          # resolves to the correct relative paths
          cd "$WORKDIR"

          python3 << PYEOF
          import shutil
          import subprocess
          import xml.etree.ElementTree as ET
          from pathlib import Path
          import tempfile

          lower_id  = "$LOWER_ID"
          upper_id  = "$UPPER_ID"
          shared_iri = "$SHARED_IRI"

          catalog_file  = Path("catalog-v001.xml").resolve()
          component_dir = Path("components")

          OWL  = "http://www.w3.org/2002/07/owl#"
          RDF  = "http://www.w3.org/1999/02/22-rdf-syntax-ns#"
          RDFS = "http://www.w3.org/2000/01/rdf-schema#"
          DCT  = "http://purl.org/dc/terms/"
          XML  = "http://www.w3.org/XML/1998/namespace"

          ET.register_namespace("owl",     OWL)
          ET.register_namespace("rdf",     RDF)
          ET.register_namespace("rdfs",    RDFS)
          ET.register_namespace("dcterms", DCT)

          # These shared infrastructure files get Manchester normalization only
          # (no shared import injection — they define the backbone, not modules)
          skip_injection = {
              "imports-edit.owl",
              f"{lower_id}-shared.owl",
              f"{lower_id}-axioms-shared.owl",
          }

          def run_robot(args):
              """Run a ROBOT command with the catalog for local import resolution."""
              cmd = ["robot", "--catalog", str(catalog_file)] + args
              result = subprocess.run(cmd, stdout=subprocess.PIPE, stderr=subprocess.STDOUT, text=True)
              if result.returncode != 0:
                  print(result.stdout)
                  raise RuntimeError(f"ROBOT command failed: {' '.join(cmd)}")
              return result.stdout

          def inject_into_rdfxml(rdfxml_path: Path, is_component_module: bool, comp_pretty: str):
              """
              Parse RDF/XML, inject owl:imports and annotations onto owl:Ontology,
              then write the modified tree back to the same path.
              """
              tree = ET.parse(rdfxml_path)
              root = tree.getroot()

              onto = root.find(f".//{{{OWL}}}Ontology")
              if onto is None:
                  raise RuntimeError(f"Could not find owl:Ontology element in {rdfxml_path}")

              if is_component_module:
                  # Ensure owl:imports shared.owl (add only if not already present)
                  already_imports = any(
                      imp.get(f"{{{RDF}}}resource") == shared_iri
                      for imp in onto.findall(f"{{{OWL}}}imports")
                  )
                  if not already_imports:
                      imp_el = ET.SubElement(onto, f"{{{OWL}}}imports")
                      imp_el.set(f"{{{RDF}}}resource", shared_iri)

                  # Ensure dcterms:title annotation
                  if not any(child.tag == f"{{{DCT}}}title" for child in list(onto)):
                      title_el = ET.SubElement(onto, f"{{{DCT}}}title")
                      title_el.set(f"{{{XML}}}lang", "en")
                      title_el.text = f"{upper_id} - {comp_pretty} Module"

                  # Ensure rdfs:comment annotation
                  if not any(child.tag == f"{{{RDFS}}}comment" for child in list(onto)):
                      comment_el = ET.SubElement(onto, f"{{{RDFS}}}comment")
                      comment_el.set(f"{{{XML}}}lang", "en")
                      comment_el.text = f"The {comp_pretty.lower()} module of the {upper_id} Ontology."

              tree.write(rdfxml_path, encoding="UTF-8", xml_declaration=True)

          def is_component_module(owl_file: Path) -> bool:
              """Returns True only for user-defined component files that need shared import."""
              return (
                  owl_file.name not in skip_injection
                  and owl_file.name.startswith(f"{lower_id}-")
              )

          def pretty_name(owl_file: Path) -> str:
              """Converts 'autoce-process_units.owl' → 'Process Units'."""
              comp = owl_file.stem[len(f"{lower_id}-"):]
              return comp.replace("_", " ").replace("-", " ").title()

          owl_files = sorted(component_dir.glob("*.owl"))
          if not owl_files:
              print("No OWL files in components/ — nothing to process.")
              raise SystemExit(0)

          with tempfile.TemporaryDirectory(prefix="owl-inject-") as td:
              tmpdir = Path(td)

              for owl_file in owl_files:
                  is_comp = is_component_module(owl_file)
                  comp_pretty_name = pretty_name(owl_file) if is_comp else ""

                  print(f"  Processing: {owl_file.name}")
                  if is_comp:
                      print(f"    → component module: injecting shared import + annotations ({comp_pretty_name})")
                  else:
                      print(f"    → infrastructure file: Manchester normalization only")

                  # Step A: Convert to RDF/XML (ROBOT normalizes and resolves catalog)
                  tmp_rdfxml = tmpdir / f"{owl_file.name}.rdfxml.owl"
                  run_robot(["convert", "--input", str(owl_file), "--format", "owl", "--output", str(tmp_rdfxml)])

                  # Step B: Inject shared import + annotations (for component modules)
                  inject_into_rdfxml(tmp_rdfxml, is_comp, comp_pretty_name)

                  # Step C: Convert back to Manchester Syntax and overwrite original
                  tmp_omn = tmpdir / f"{owl_file.name}.omn.owl"
                  run_robot(["convert", "--input", str(tmp_rdfxml), "--format", "omn", "--output", str(tmp_omn)])

                  shutil.move(str(tmp_omn), str(owl_file))
                  print(f"    ✓ Written (Manchester Syntax): {owl_file.name}")

          print("Component injection and Manchester normalization complete.")
          PYEOF

      # ========================================================================
      # STEP 19: Final Validation (Print Key Files)
      # ========================================================================
      # Prints the content of the three backbone files and a sample component
      # file so you can verify the import structure is correct in the logs.
      # This is a read-only validation step — it does not modify any files.
      # ========================================================================
      - name: Final validation (print key generated files)
        shell: bash
        run: |
          set -euo pipefail
          ID="${{ github.event.inputs.ontology_id }}"
          LOWER_ID=$(echo "$ID" | tr '[:upper:]' '[:lower:]')

          echo "=== Final Validation: Import Architecture ==="
          echo ""
          echo "--- imports-edit.owl (first 25 lines) ---"
          head -25 "src/ontology/components/imports-edit.owl" || echo "(file not found)"
          echo ""
          echo "--- ${LOWER_ID}-shared.owl ---"
          cat "src/ontology/components/${LOWER_ID}-shared.owl" || echo "(file not found)"
          echo ""
          echo "--- ${LOWER_ID}-axioms-shared.owl ---"
          cat "src/ontology/components/${LOWER_ID}-axioms-shared.owl" || echo "(file not found)"
          echo ""
          echo "--- Sample component file (first component, first 30 lines) ---"
          FIRST_COMP=$(ls "src/ontology/components/${LOWER_ID}-"*.owl 2>/dev/null \
            | grep -v "shared" | grep -v "axioms" | head -1)
          if [ -n "$FIRST_COMP" ]; then
            echo "File: $FIRST_COMP"
            head -30 "$FIRST_COMP"
          else
            echo "(no component files found)"
          fi
          echo ""
          echo "=== Validation complete ==="

      # ========================================================================
      # STEP 20: Cleanup Temporary Workflow Files
      # ========================================================================
      # Removes the .workflow-temp/ directory that was used as a tracking
      # mechanism between steps. This directory is not part of the ontology
      # and should not be committed to the repository.
      # ========================================================================
      - name: Cleanup temporary workflow tracking files
        shell: bash
        run: |
          set -euo pipefail
          echo "Removing .workflow-temp/ tracking directory..."
          rm -rf .workflow-temp
          echo "Cleanup complete."

      # ========================================================================
      # STEP 21: Commit and Push All Generated Files
      # ========================================================================
      # Stages all generated files and commits them to the branch that triggered
      # this workflow. The .github/ directory is explicitly excluded from the
      # commit (via git reset) to prevent any ODK-generated workflow files from
      # overwriting our production workflows.
      #
      # If there are no changes (e.g. re-run of the same configuration),
      # the commit is skipped gracefully without failing.
      # ========================================================================
      - name: Commit and push all generated ontology files
        shell: bash
        run: |
          set -euo pipefail
          LOWER_ID=$(echo "${{ github.event.inputs.ontology_id }}" | tr '[:upper:]' '[:lower:]')
          UPPER_ID=$(echo "${{ github.event.inputs.ontology_id }}" | tr '[:lower:]' '[:upper:]')

          # Stage everything
          git add .

          # Un-stage .github/ to preserve our custom production workflows
          git reset .github 2>/dev/null || true

          git commit -m "chore: Initial seed setup of ${UPPER_ID} ontology
          
          Auto-generated via 'Setup New Ontology' GitHub Actions workflow:
          - Configured project-odk.yaml (URI base: https://w3id.org/pmd/${LOWER_ID}/)
          - imports-edit.owl aggregates all *_import.owl modules
          - ${LOWER_ID}-shared.owl imports imports-edit.owl (shared base for all components)
          - Each ${LOWER_ID}-{component}.owl imports ${LOWER_ID}-shared.owl with annotations
          - ${LOWER_ID}-axioms-shared.owl imports ALL unique component files (no duplicates)
          - Generated ${LOWER_ID}-edit.owl (ontology source) and ${LOWER_ID}-idranges.owl
          - Initialized ROBOT template TSV files in src/templates/" \
          || echo "No changes to commit — repository may already be up to date."

          git push origin HEAD:${{ github.ref_name }}
          echo "Changes committed and pushed to ${{ github.ref_name }}."

      # ========================================================================
      # STEP 22: Trigger QC Build Workflow
      # ========================================================================
      # Dispatches a repository event to kick off the Build Ontology (QC)
      # workflow (qc.yml). This builds the full release artifacts and then
      # triggers documentation generation.
      #
      # Workflow chain after this step:
      #   [this: setup-repo] → trigger-qc → qc.yml → trigger-docs → docs.yml
      #
      # Why trigger-qc directly (not trigger-refresh-imports)?
      # - This workflow already ran make refresh-imports in Step 13
      # - Triggering refresh-imports again would be redundant
      # - qc.yml's build step runs make refresh-imports internally as well,
      #   ensuring everything is fresh before generating release artifacts
      # ========================================================================
      - name: Trigger QC build workflow
        uses: peter-evans/repository-dispatch@v3
        with:
          # GITHUB_TOKEN is available with the 'contents: write' job permission
          token: ${{ secrets.GITHUB_TOKEN }}
          # qc.yml listens for this event type via its repository_dispatch trigger
          event-type: trigger-qc
